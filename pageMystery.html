<body style="background-color: black;">

  <div id="clip-container">
        <iframe id="twitch-clip-iframe" 
                src="" 
                height="480" 
                width="854" 
                allowfullscreen="true" 
                scrolling="no" 
                frameborder="0">
        </iframe>
    </div>

    <button onclick="loadRandomClip()">Play Next Clip</button>

    <script>
        // 1. Add your Twitch clip slugs here
        const clipSlugs = [
            "AmazonianRepleteAsparagusThunBeast",
            "YawningCrowdedThymeTwitchRaid",
            "TubularHorribleOrcaBCWarrior",
            "FaintBlazingFoxBleedPurple",
            "ZealousHonestTortoiseDoggo",
        ];

        // 2. Set your website domain (required by Twitch)
        const parentDomain = "https://punts4115.github.io/Punts4115-website/pageMystery.html"; 

        function loadRandomClip() {
            // Pick a random clip from the array
            const randomIndex = Math.floor(Math.random() * clipSlugs.length);
            const selectedSlug = clipSlugs[randomIndex];

            // Build the embed URL
            const embedUrl = `https://twitch.tv{selectedSlug}&parent=${parentDomain}`;

            // Update the iframe src
            document.getElementById("twitch-clip-iframe").src = embedUrl;
        }

        // Load a clip when the page first loads
        window.onload = loadRandomClip;
    </script>





  <style>
    .numberText{
        color: white;
    }
  </style>
  <p class="numberText">Your lucky number is: <span id="output"></span></p>
  <script>
        // Generate random number between 1 and 100 on page load
        window.onload = function() {
            const min = 1;
            const max = 1000;
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            
            document.getElementById('output').textContent = randomNum;
        };
  </script>

</body>
