<body style="background-color: black;">
  <video width="1280" height="720" controls>
  <source src="jarona.mp4" type="video/mp4">
  Your browser does not support the video tag.
  </video>

  <style>
    .numberText{
        color: white;
    }
  </style>
  <p class="numberText">Your lucky number is: <span id="output"></span></p>
  <script>
        // Generate random number between 1 and 100 on page load
        window.onload = function() {
            const min = 1;
            const max = 1000;
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            
            document.getElementById('output').textContent = randomNum;
        };
  </script>

</body>
